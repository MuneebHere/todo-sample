<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>My To-Do List</h1>

    <!-- Add Task Form -->
    <div class="input-form">

      <!-- Row 1: Task text -->
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Add a new task..." />
      </div>

      <!-- Row 2: Due date, due time, Add button -->
      <div class="input-row date-row">
        <div class="field-group">
          <label for="dueDateInput">Due Date</label>
          <input type="date" id="dueDateInput" />
        </div>
        <div class="field-group">
          <label for="dueTimeInput">Due Time</label>
          <input type="time" id="dueTimeInput" />
        </div>
        <button id="addBtn">Add</button>
      </div>

    </div>

    <!-- Task List -->
    <ul id="taskList"></ul>

    <!-- Shown when list is empty -->
    <p id="emptyMsg" class="empty-msg">No tasks yet. Add one above!</p>

    <!-- Clear all — only visible when tasks exist -->
    <div class="list-footer">
      <button id="clearAllBtn" class="clear-all-btn">Clear all tasks</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
